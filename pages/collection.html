<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection — Mini Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #0c0b09;
    --bg-raised: #141210;
    --hairline: #2a2620;
    --gold: #c9a24b;
    --gold-bright: #e8c877;
    --cream: #ece6d8;
    --cream-dim: #a89f8c;
    --mono: #8a8072;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background: var(--bg); color: var(--cream);
    font-family:'Jost', sans-serif; font-weight:300; line-height:1.6;
  }
  a{ color:inherit; text-decoration:none; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem; letter-spacing:0.22em;
    text-transform:uppercase; color: var(--gold);
  }
  .rule-row{ display:flex; align-items:center; gap:14px; margin:18px 0 28px; }
  .rule-row .line{ height:1px; background: var(--hairline); flex:1; }
  .rule-row .diamond{ width:6px; height:6px; background: var(--gold); transform:rotate(45deg); flex-shrink:0; }

  header{
    position: sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 56px;
    background: rgba(12,11,9,0.88);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--hairline);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{ width:30px; height:30px; border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; }
  .brand-mark svg{ width:16px; height:16px; fill: var(--gold); }
  .brand-name{ font-family:'Cormorant Garamond', serif; font-size:1.35rem; letter-spacing:0.06em; font-weight:600; }
  nav ul{ display:flex; gap:34px; list-style:none; }
  nav ul li a{ font-size:0.85rem; color: var(--cream-dim); position:relative; padding-bottom:4px; }
  nav ul li a.active{ color: var(--gold-bright); }
  nav ul li a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background: var(--gold-bright); transition:width .35s ease; }
  nav ul li a:hover{ color: var(--cream); }
  nav ul li a:hover::after{ width:100%; }
  nav{ display:flex; align-items:center; gap:40px; }
  .btn-gold{
    font-family:'IBM Plex Mono', monospace; font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase;
    color:#0c0b09; background: var(--gold); padding:11px 22px; border:1px solid var(--gold);
    transition: background .25s ease;
  }
  .btn-gold:hover{ background: var(--gold-bright); }
  .login-link{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color: var(--cream-dim); transition: color .2s ease; }
  .login-link:hover{ color: var(--gold-bright); }
  #authArea{ display:flex; align-items:center; gap:20px; position:relative; }
  .user-menu-btn{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:#0c0b09; background: var(--gold); border:1px solid var(--gold); padding:11px 20px; cursor:pointer; display:flex; align-items:center; gap:8px; transition: background 0.25s ease; }
  .user-menu-btn:hover{ background: var(--gold-bright); color:#0c0b09; }
  .user-menu-btn svg{ stroke:#0c0b09; }
  .user-menu-btn svg{ width:10px; height:10px; }
  .dropdown{
    position:absolute; top: calc(100% + 14px); right:0; min-width:200px;
    background: var(--bg-raised); border:1px solid var(--hairline); display:none; flex-direction:column; z-index:60;
  }
  .dropdown.open{ display:flex; }
  .dropdown a, .dropdown button{
    text-align:left; padding: 13px 18px; font-family:'IBM Plex Mono', monospace; font-size:0.7rem; letter-spacing:0.06em;
    text-transform:uppercase; color: var(--cream-dim); border-bottom:1px solid var(--hairline); background:none; border-left:none; border-right:none; border-top:none; cursor:pointer;
  }
  .dropdown a:last-child, .dropdown button:last-child{ border-bottom:none; }
  .dropdown a:hover, .dropdown button:hover{ color: var(--gold-bright); background: rgba(201,162,75,0.05); }
  .user-chip{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; letter-spacing:0.08em; color: var(--cream-dim); }
  .logout-link{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color: var(--cream-dim); cursor:pointer; background:none; border:none; padding:0; }
  .logout-link:hover{ color: var(--gold-bright); }

  .page-head{ padding: 70px 56px 20px; max-width:1280px; margin:0 auto; }
  .page-head h1{ font-family:'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight:500; }

  .controls{
    max-width:1280px; margin: 0 auto; padding: 0 56px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap;
  }
  .search-box{
    flex:1; min-width:240px; max-width:420px;
    display:flex; align-items:center; gap:10px;
    border:1px solid var(--hairline); background: var(--bg-raised);
    padding: 12px 16px;
  }
  .search-box svg{ width:15px; height:15px; stroke: var(--mono); flex-shrink:0; }
  .search-box input{
    background:transparent; border:none; outline:none; color: var(--cream);
    font-family:'Jost', sans-serif; font-size:0.92rem; width:100%;
  }
  .search-box input::placeholder{ color: var(--mono); }

  .filters{ display:flex; gap:10px; flex-wrap:wrap; }
  .filter-btn{
    font-family:'IBM Plex Mono', monospace; font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase;
    color: var(--cream-dim); border:1px solid var(--hairline); padding:9px 16px; background:transparent;
    cursor:pointer; transition: all .2s ease;
  }
  .filter-btn:hover{ border-color: var(--gold); color: var(--cream); }
  .filter-btn.active{ background: var(--gold); border-color: var(--gold); color:#0c0b09; }

  .result-count{
    max-width:1280px; margin: 0 auto; padding: 0 56px 10px;
    font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color: var(--mono); letter-spacing:0.05em;
  }

  .grid{
    max-width:1280px; margin: 0 auto; padding: 10px 56px 100px;
    display:grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  }
  .mini-card{
    border:1px solid var(--hairline); background: var(--bg-raised); overflow:hidden;
    transition: border-color .3s ease, transform .3s ease; cursor:pointer;
  }
  .mini-card:hover{ border-color: var(--gold); transform: translateY(-4px); }
  .mini-card .thumb{
    height: 190px; position:relative;
    background: linear-gradient(160deg, #23201a, #131110);
    display:flex; align-items:center; justify-content:center;
  }
  .mini-card .thumb .placeholder-icon{ width:30px; height:30px; opacity:0.3; }
  .mini-card .thumb .id-tag{
    position:absolute; top:10px; left:10px;
    font-family:'IBM Plex Mono', monospace; font-size:0.62rem; letter-spacing:0.06em;
    color: var(--gold); border:1px solid rgba(201,162,75,0.4); padding:3px 7px;
  }
  .mini-card .thumb .status-tag{
    position:absolute; top:10px; right:10px;
    font-family:'IBM Plex Mono', monospace; font-size:0.6rem; letter-spacing:0.06em; text-transform:uppercase;
    padding:3px 7px; border:1px solid var(--hairline); color: var(--cream-dim);
  }
  .status-tag.finished{ color:#8fae7a; border-color: rgba(143,174,122,0.4); }
  .mini-card .thumb .card-edit-link{
    position:absolute; bottom:10px; right:10px; z-index:5;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    background: rgba(12,11,9,0.75); border:1px solid var(--hairline); color: var(--cream-dim);
    font-size:0.85rem; text-decoration:none; transition: border-color .2s ease, color .2s ease;
  }
  .mini-card .thumb .card-edit-link:hover{ border-color: var(--gold); color: var(--gold-bright); }
  .status-tag.wip{ color: var(--gold-bright); border-color: rgba(201,162,75,0.4); }
  .status-tag.queued{ color: var(--mono); }

  .mini-card .info{ padding:16px 18px 20px; }
  .mini-card .info .name{ font-family:'Cormorant Garamond', serif; font-size:1.15rem; font-weight:600; }
  .mini-card .info .meta{
    margin-top:5px; font-family:'IBM Plex Mono', monospace; font-size:0.64rem;
    letter-spacing:0.05em; color: var(--mono); text-transform:uppercase;
  }

  .empty-state{
    grid-column: 1 / -1; text-align:center; padding: 70px 20px;
    color: var(--cream-dim);
  }
  .empty-state .eyebrow{ display:block; margin-bottom: 10px; }

  footer{
    border-top:1px solid var(--hairline); padding:32px 56px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:'IBM Plex Mono', monospace; font-size:0.7rem; color: var(--mono);
  }

  @media (max-width: 1100px){ .grid{ grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px){
    header{ padding:18px 24px; }
    nav ul{ display:none; }
    .page-head, .controls, .result-count, .grid{ padding-left:24px; padding-right:24px; }
    .grid{ grid-template-columns: repeat(2, 1fr); }
    footer{ flex-direction:column; gap:14px; text-align:center; padding:24px; }
  }
  @media (max-width: 500px){ .grid{ grid-template-columns: 1fr; } }

  :focus-visible{ outline:1px solid var(--gold-bright); outline-offset:3px; }
</style>
</head>
<body>

<header>
  <a class="brand" href="index.html">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2 3 6v6c0 5.2 3.6 9.9 9 11 5.4-1.1 9-5.8 9-11V6l-9-4z"/></svg>
    </div>
    <div class="brand-name">MINI ARCHIVE</div>
  </a>
  <nav>
    <ul>
      <li><a class="active" href="collection.html">Collection</a></li>
      <li><a href="index.html#how">How it works</a></li>
      <li><a href="index.html#provenance">Provenance</a></li>
      <li><a href="index.html#about">About</a></li>
    </ul>
    <div id="authArea">
      <a class="login-link" href="login.html">Log in</a>
      <a class="btn-gold" href="start.html">Start an Archive</a>
    </div>
  </nav>
</header>

<div class="page-head">
  <div class="eyebrow">The Collection</div>
  <div class="rule-row"><div class="line"></div><div class="diamond"></div><div class="line"></div></div>
  <h1>Every model, catalogued.</h1>
</div>

<div class="controls">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
    <input id="searchInput" type="text" placeholder="Search by name or painter…" autocomplete="off">
  </div>
</div>

<div class="result-count" id="resultCount"></div>

<div class="grid" id="grid"></div>

<footer>
  <div>© 2026 Mini Archive. Every miniature has a story.</div>
  <div><a href="index.html">← Back home</a></div>
</footer>

<script>
  const SUPABASE_URL = "https://oesjjvrofwlhcxilwaen.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lc2pqdnJvZndsaGN4aWx3YWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3Mzg5MDEsImV4cCI6MjEwMDMxNDkwMX0.Tazlir8gkSk8Y-aQMFOjmgadCgOhyaTfV8p8dWi9thw";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const grid = document.getElementById("grid");
  const searchInput = document.getElementById("searchInput");
  const resultCount = document.getElementById("resultCount");
  let ALL_MINIS = [];
  let isMineView = false;

  const shieldIcon = `<svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="#c9a24b" stroke-width="1"><path d="M12 2 3 6v6c0 5.2 3.6 9.9 9 11 5.4-1.1 9-5.8 9-11V6l-9-4z"/></svg>`;

  async function loadMinis(){
    isMineView = new URLSearchParams(window.location.search).get("mine") === "true";
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (isMineView && !session){
      window.location.href = "login.html";
      return;
    }

    let query = supabaseClient
      .from("miniatures")
      .select(`
        id, archive_id, title, manufacturer, status, hours_worked, owner_profile_id, painter_name,
        photos ( image_url, photo_type ),
        profiles:owner_profile_id ( username, display_name )
      `)
      .order("created_at", { ascending: false });

    if (isMineView){
      query = query.eq("owner_profile_id", session.user.id);
      document.querySelector(".page-head h1").textContent = "Your models, catalogued.";
      document.querySelector(".eyebrow").textContent = "My Collection";
    } else {
      query = query.eq("visibility", "public").eq("status", "completed");
    }

    const { data, error } = await query;

    if (error){
      console.error("Failed to load miniatures:", error);
      grid.innerHTML = `<div class="empty-state"><span class="eyebrow">Couldn't load the collection</span>Something went wrong fetching models. Check the console for details.</div>`;
      return;
    }

    ALL_MINIS = (data || []).map(m => {
      const frontPhoto = (m.photos || []).find(p => p.photo_type === "front");
      const anyPhoto = frontPhoto || (m.photos || [])[0];
      const painterLabel = m.painter_name || "Unattributed";
      return {
        id: m.id,
        code: m.archive_id,
        name: m.title,
        manufacturer: m.manufacturer || "—",
        painter: painterLabel,
        hours: m.hours_worked || 0,
        status: m.status,
        thumbUrl: anyPhoto?.image_url || null,
      };
    });

    render();
  }

  function render(){
    const query = searchInput.value.trim().toLowerCase();
    const filtered = ALL_MINIS.filter(m => {
      return !query || m.name.toLowerCase().includes(query) || m.painter.toLowerCase().includes(query);
    });

    resultCount.textContent = `${filtered.length} model${filtered.length === 1 ? "" : "s"}`;

    if (filtered.length === 0){
      grid.innerHTML = isMineView
        ? `<div class="empty-state"><span class="eyebrow">No models yet</span>You haven't logged anything yet. <a href="edit-model.html" style="color:var(--gold-bright);">Add your first model →</a></div>`
        : `<div class="empty-state"><span class="eyebrow">No matches</span>Nothing fits that search yet. Try a different name or painter.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(m => {
      const isDraft = m.status === "in_progress";
      const linkTarget = isDraft ? `edit-model.html?id=${m.id}` : `model.html?id=${m.id}`;
      const tag = isDraft
        ? `<span class="status-tag wip">Draft</span>`
        : `<span class="id-tag">${m.code}</span>`;
      const editShortcut = (isMineView && !isDraft)
        ? `<a href="edit-model.html?id=${m.id}" onclick="event.stopPropagation()" class="card-edit-link" title="Edit this model">✎</a>`
        : "";
      return `
        <div class="mini-card" onclick="window.location.href='${linkTarget}'">
          <div class="thumb">
            ${tag}
            ${editShortcut}
            ${m.thumbUrl ? `<img src="${m.thumbUrl}" alt="${m.name}" style="width:100%;height:100%;object-fit:cover;">` : shieldIcon}
          </div>
          <div class="info">
            <div class="name">${m.name}</div>
            <div class="meta">${isDraft ? "On your workbench — click to publish" : `${m.manufacturer} · ${m.painter}`}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  searchInput.addEventListener("input", render);

  loadMinis();

  // ---- Auth nav state ----
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) renderLoggedInNav(session);
  })();

  async function renderLoggedInNav(session){
    const authArea = document.getElementById("authArea");
    if (!authArea) return;

    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("username, display_name")
      .eq("id", session.user.id)
      .maybeSingle();

    const label = profile?.username || profile?.display_name || session.user.email;

    authArea.innerHTML = `
      <button class="user-menu-btn" id="userMenuBtn">${label} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
      <div class="dropdown" id="userDropdown">
        <a href="collection.html?mine=true">My Collection</a>
        <a href="edit-model.html">Add a Model</a>
        <a href="account.html">Account Settings</a>
        <button id="logoutBtn">Log out</button>
      </div>
    `;

    const btn = document.getElementById("userMenuBtn");
    const dropdown = document.getElementById("userDropdown");
    btn.addEventListener("click", (e) => { e.stopPropagation(); dropdown.classList.toggle("open"); });
    document.addEventListener("click", () => dropdown.classList.remove("open"));

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.reload();
    });
  }
</script>

</body>
</html>
